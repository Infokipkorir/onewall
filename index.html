<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneWall - Tasks</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f6f9;
  display:flex;
}

/* Sidebar */
.sidebar{
  width:220px;
  height:100vh;
  background:#1f2937;
  color:white;
  position:fixed;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.sidebar h2{
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  margin:10px 0;
  padding:10px;
  border-radius:6px;
  transition: 0.3s;
}

.sidebar a:hover{
  background:#3b82f6;
}

/* Main content */
.main{
  margin-left:240px;
  padding:20px;
  flex:1;
}

h1{
  color:#111827;
}

.task-feed{
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-top:20px;
}

.task-card{
  background:white;
  border-left:5px solid #3b82f6;
  padding:15px;
  border-radius:8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}

.task-card:hover{
  transform: translateY(-3px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.task-card h3{
  margin:0 0 10px 0;
  color:#1d4ed8;
}

.task-card p{
  margin:5px 0;
  color:#374151;
}

.task-card small{
  color:#6b7280;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>OneWall</h2>
  <a href="index.html">Home</a>
  <a href="tasks.html">Tasks</a>
  <a href="profile.html">Profile</a>
  <a href="logout.html">Logout</a>
</div>

<div class="main">
  <h1>Available Tasks</h1>
  <div class="task-feed" id="taskFeed">
    <!-- Tasks will be dynamically inserted here -->
  </div>
</div>

<script>
  // ===== Simulated real-time admin task feed =====
  // Replace this array with backend API fetch in real deployment
  const tasks = [
    {
      title: "Follow our Facebook Page",
      description: "Follow our official Facebook page and submit a screenshot.",
      reward: "10 credits",
      deadline: "2 days left"
    },
    {
      title: "Subscribe to YouTube Channel",
      description: "Subscribe to OneWall YouTube channel and submit proof.",
      reward: "15 credits",
      deadline: "3 days left"
    },
    {
      title: "Share Instagram Post",
      description: "Share our latest Instagram post and submit screenshot.",
      reward: "8 credits",
      deadline: "1 day left"
    },
    {
      title: "LinkedIn Follow",
      description: "Follow OneWall LinkedIn page for professional updates.",
      reward: "12 credits",
      deadline: "4 days left"
    }
  ];

  const taskFeed = document.getElementById('taskFeed');

  function displayTasks(){
    taskFeed.innerHTML = ""; // clear first
    tasks.forEach(task => {
      const div = document.createElement('div');
      div.className = 'task-card';
      div.innerHTML = `
        <h3>${task.title}</h3>
        <p>${task.description}</p>
        <small>Reward: ${task.reward} | Deadline: ${task.deadline}</small>
      `;
      taskFeed.appendChild(div);
    });
  }

  displayTasks();

  // ===== Optional: simulate admin posting new tasks every 10 sec =====
  setInterval(() => {
    const newTask = {
      title: "New Task #" + Math.floor(Math.random()*100),
      description: "Complete this new task and submit proof.",
      reward: (5 + Math.floor(Math.random()*15)) + " credits",
      deadline: (1 + Math.floor(Math.random()*5)) + " days left"
    };
    tasks.unshift(newTask); // add to top
    displayTasks();
  }, 10000);
</script>

</body>
</html>
