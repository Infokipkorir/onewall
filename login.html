<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneWall - Login</title>
<style>
  body, html {
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#3b82f6,#f97316);
  }

  .login-container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    width:300px;
    text-align:center;
    color:#fff;
  }

  .login-container h2 {
    margin-bottom:20px;
    font-size:2em;
    text-shadow: 1px 1px 5px #000;
  }

  .login-container input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
  }

  .login-container button {
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#f97316;
    color:#fff;
    font-size:1em;
    cursor:pointer;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .login-container button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #fff;
  }

  .login-container small {
    display:block;
    margin-top:10px;
    font-size:0.85em;
  }

  a { color:#3b82f6; text-decoration:none; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="login-container">
  <h2>Login to OneWall</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <small>Don't have an account? <a href="register.html">Register</a></small>
  </form>
</div>

<script>
  const form = document.getElementById('loginForm');

  form.addEventListener('submit', function(e){
    e.preventDefault(); // prevent default form submission

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    // Simple validation
    if(username === "" || password === ""){
      alert("Please enter both username and password.");
      return;
    }

    // Simulated login: replace with real backend check
    if(username === "user" && password === "1234"){
      alert("Login successful! Redirecting to tasks...");
      window.location.href = "tasks.html";
    } else {
      alert("Invalid username or password.");
    }
  });
</script>

</body>
</html>
